<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mobile preview — 390px</title>
<style>
  :root{ --dev-w:390px; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#3a3a3c;color:#fff;}
  body{display:flex;flex-direction:column;}
  header{flex:0 0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 16px;background:#1c1c1e;border-bottom:1px solid #000;}
  header b{font-size:13px;letter-spacing:.02em;color:#fff;}
  select{font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid #555;background:#2c2c2e;color:#fff;cursor:pointer;}
  .nav{display:flex;gap:6px;}
  button{font-size:13px;padding:7px 12px;border-radius:8px;border:1px solid #555;background:#2c2c2e;color:#fff;cursor:pointer;}
  button:hover{background:#3a3a3c;}
  .dim{margin-left:auto;font-size:12px;color:#9aa0a6;}
  .stage{flex:1 1 auto;overflow:auto;display:flex;justify-content:center;padding:24px 0 60px;}
  .phone{width:var(--dev-w);flex:0 0 auto;height:844px;border:10px solid #000;border-radius:38px;overflow:hidden;background:#fff;box-shadow:0 20px 60px rgba(0,0,0,.5);}
  iframe{width:100%;height:100%;border:0;display:block;background:#fff;}
</style>
</head>
<body>
<header>
  <b>Mobile preview</b>
  <select id="page"></select>
  <div class="nav">
    <button id="prev">‹ Prev</button>
    <button id="next">Next ›</button>
  </div>
  <span class="dim" id="dim">390 × 844</span>
</header>
<div class="stage">
  <div class="phone"><iframe id="frame" src=""></iframe></div>
</div>
<script>
  const PAGES = [
    "ClaimSense Homepage.dc.html",
    "ClaimSense Features.dc.html",
    "ClaimSense Architecture.dc.html",
    "ClaimSense Use Cases.dc.html",
    "ClaimSense Implementation.dc.html",
    "ClaimSense Pricing.dc.html",
    "ClaimSense Business Case.dc.html",
    "ClaimSense Partners.dc.html",
    "ClaimSense Our Story.dc.html",
    "ClaimSense FAQ.dc.html",
    "ClaimSense Careers.dc.html",
    "ClaimSense Help.dc.html"
  ];
  const sel = document.getElementById('page');
  const frame = document.getElementById('frame');
  PAGES.forEach((p,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=p.replace('ClaimSense ','').replace('.dc.html',''); sel.appendChild(o); });
  let idx = 0;
  function load(){ sel.value=idx; frame.src = '../' + encodeURI(PAGES[idx]); }
  sel.addEventListener('change', ()=>{ idx=+sel.value; load(); });
  document.getElementById('prev').addEventListener('click', ()=>{ idx=(idx-1+PAGES.length)%PAGES.length; load(); });
  document.getElementById('next').addEventListener('click', ()=>{ idx=(idx+1)%PAGES.length; load(); });
  load();
</script>
</body>
</html>
